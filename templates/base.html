<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Website</title>

        <!-- ======================================================= -->
        <!-- Custom fonts -->
        <!-- ======================================================= -->

        <!-- Libertinus Sans -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

        <!-- Libertinus Sans: CSS classes -->
        <!--
        .libertinus-sans-regular {
          font-family: "Libertinus Sans", sans-serif;
          font-weight: 400;
          font-style: normal;
        }

        .libertinus-sans-bold {
          font-family: "Libertinus Sans", sans-serif;
          font-weight: 700;
          font-style: normal;
        }

        .libertinus-sans-regular-italic {
          font-family: "Libertinus Sans", sans-serif;
          font-weight: 400;
          font-style: italic;
        }

        <link rel="stylesheet" href="{{ get_url(path='css/libertinus-sans.css') }}">
        -->

        <!-- Libertinus Mono-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Libertinus+Math&family=Libertinus+Mono&family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

        <!-- Libertinus Mono: CSS classes -->
        <!--
        .libertinus-mono-regular {
          font-family: "Libertinus Mono", monospace;
          font-weight: 400;
          font-style: normal;
        }

        <link rel="stylesheet" href="{{ get_url(path='css/libertinus-mono.css') }}">
        -->

        <!-- Libertinus Maths -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Libertinus+Math&family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

        <!-- Libertinus Maths: CSS classes -->
        <!--
        .libertinus-math-regular {
          font-family: "Libertinus Math", system-ui;
          font-weight: 400;
          font-style: normal;
        }

        <link rel="stylesheet" href="{{ get_url(path='css/libertinus-maths.css') }}">
        -->

        <!-- ======================================================= -->
        <!-- CSS overrides (PicoCSS) -->
        <!-- ======================================================= -->

        <link rel="stylesheet" href="{{ get_url(path='css/pico.css') }}">
        <link rel="stylesheet" href="{{ get_url(path='css/custom.css') }}">
    </head>

    <body>
        <!-- Nav bar -->
        <header class="container">
            <nav>
                <ul>
                    <!-- Brand Logo / Title on the left -->
                    <li>
                        <a href="{{ config.base_url | safe }}" class="contrast">
                            <strong>{{ config.title }}</strong>
                        </a>
                    </li>
                </ul>
                <ul>
                    <!-- Navigation links loop on the right -->
                    {% if config.extra.menu %}
                        {% for item in config.extra.menu %}
                            {% set is_active = current_path == item.url %}
                            <li>
                                <a href="{{ get_url(path=item.url) }}"
                                   {% if is_active %}aria-current="page"{% else %}class="secondary"{% endif %}>
                                    {{ item.name }}
                                </a>
                            </li>
                        {% endfor %}
                    {% endif %}
                </ul>
            </nav>
        </header>
        <!-- Page content -->
        <section class="section">
            <div class="container">
                {% block content %} {% endblock content %}
            </div>
        </section>
    </body>
</html>
