{% extends "base.html" %}

{% block content %}

<h1>{{ section.title }}</h1>

{{ section.content | safe }}

<ul>
{% for path in section.subsections %}
    {% set s = get_section(path=path) %}
    <li>
        <a href="{{ s.permalink }}">{{ s.title }}</a>
    </li>
{% endfor %}
</ul>

{% endblock content %}
